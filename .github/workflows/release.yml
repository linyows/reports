name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-cli:
    name: Build CLI
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: reports-linux-amd64
          - os: ubuntu-24.04-arm
            artifact: reports-linux-arm64
          - os: macos-latest
            artifact: reports-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak "s/\.version = \"[^\"]*\",/.version = \"${VERSION}\",/" build.zig.zon
          rm -f build.zig.zon.bak
          echo "Updated build.zig.zon to version ${VERSION}"
          grep '\.version' build.zig.zon

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libcurl4-openssl-dev zlib1g-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install libxml2 curl

      - name: Build
        run: zig build --release=fast

      - name: Create archive
        run: |
          mkdir -p ${{ matrix.artifact }}
          cp zig-out/bin/reports ${{ matrix.artifact }}/
          tar -czvf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  build-app:
    name: Build macOS App
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak "s/\.version = \"[^\"]*\",/.version = \"${VERSION}\",/" build.zig.zon
          rm -f build.zig.zon.bak

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install dependencies
        run: |
          brew install libxml2 curl xcodegen

      - name: Build XCFramework
        run: cd macos && ./build.sh

      - name: Generate Xcode project
        run: cd macos && xcodegen generate

      - name: Build app
        run: |
          cd macos
          xcodebuild -project Reports.xcodeproj -scheme Reports \
            -configuration Release \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create DMG
        run: |
          cd macos
          BUILD_DIR=$(xcodebuild -project Reports.xcodeproj -scheme Reports \
            -configuration Release -showBuildSettings 2>/dev/null \
            | grep -m1 'BUILT_PRODUCTS_DIR' | awk '{print $3}')
          rm -rf dmg_staging
          mkdir -p dmg_staging
          cp -R "$BUILD_DIR/Reports.app" dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create -volname "Reports" -srcfolder dmg_staging \
            -ov -format UDZO "Reports-macOS-arm64.dmg"
          rm -rf dmg_staging

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Reports-macOS-arm64
          path: macos/Reports-macOS-arm64.dmg

  release:
    name: Release
    needs: [build-cli, build-app]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            if [ -f "$dir$name.tar.gz" ]; then
              cp "$dir$name.tar.gz" "release/"
            elif [ -f "$dir$name.dmg" ]; then
              cp "$dir$name.dmg" "release/"
            fi
          done
          cd release
          sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
